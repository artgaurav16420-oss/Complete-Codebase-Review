name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f39ef2b9c
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@6849a6489940f00c2f30c0fb92c6274df055279a
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install test dependencies
        run: python -m pip install 'coverage>=7.0,<8'

      - name: Syntax check
        run: >
          python -c "import glob, py_compile;
          [py_compile.compile(f, doraise=True)
          for f in glob.glob('**/*.py', recursive=True)
          if 'site-packages' not in f and '__pycache__' not in f
          and '.skills' not in f and '.code-review-cache' not in f]"

      - name: Run all unittest suites under coverage
        run: python -m coverage run --source=. -m unittest discover -s tests -p "test_*.py" -v

      - name: Coverage report
        run: python -m coverage report

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report-${{ matrix.os }}-${{ matrix.python-version }}
          path: .coverage
          retention-days: 7

      - name: Run Bash test suite
        if: runner.os != 'Windows'
        run: ./test.sh
        shell: bash

      - name: Run Windows PowerShell test suite
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File tests/Test-Windows.ps1
        shell: powershell
