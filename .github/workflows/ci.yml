name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: python -m pip install coverage

      - name: Run Python compliance tests
        run: python tests/test_compliance.py

      - name: Run all unittest suites
        run: python -m coverage run --source=. --omit=".skills/*,.code-review-cache/*,__pycache__/*,tests/dummy_repo/*,ADRs/*" -m unittest discover -s tests -p "test_*.py" -v

      - name: Coverage report
        run: python -m coverage report

      - name: Run Bash test suite
        if: runner.os != 'Windows'
        run: ./test.sh
        shell: bash
